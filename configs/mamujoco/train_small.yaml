# MTMARL 最小可跑训练配置：cheetah(run, run_backwards) + humanoid(walk)
#
# 该配置只用 3 个任务、较小的并行环境数与较短的训练步数，目的是把
# 端到端流水线点亮，验证 encoder / dynamics / reward / actor / critic
# 与 trainer / runner / buffer 的协同正确性。生产训练请在此基础上
# 放大 num_envs / num_env_steps / latent_dim 等。

env:
  domains:
    half_cheetah:
      agent_conf: "2x3"
      tasks:
        - run
        - run_backwards
    humanoid:
      agent_conf: "9|8"
      tasks:
        - walk
  num_train_envs: 4
  num_eval_envs: 2
  use_subproc: false  # 单进程便于调试，生产时改 true

model:
  latent_dim: 256
  encoder_hidden_dims: [256, 256]
  dynamics_hidden_dims: [256, 256]
  dynamics_n_experts: 4
  dynamics_n_slots_per_expert: 1
  reward_n_experts: 4
  reward_top_k: 2
  reward_attention_heads: 1
  reward_ffn_hidden_dim: 256
  reward_head_hidden_dim: 256
  actor_hidden_dims: [256, 256]
  critic_hidden_dims: [256, 256]
  num_bins: 51
  reward_min: -10.0
  reward_max: 10.0
  simnorm_group_dim: 8

train:
  num_env_steps: 200000
  warmup_steps: 5000
  update_every: 1
  updates_per_step: 1
  batch_size: 256
  horizon: 3
  buffer_size: 200000
  log_interval: 1000
  eval_interval: 10000
  eval_episodes: 5

algo:
  gamma: 0.99
  polyak: 0.005
  alpha: 0.2
  n_step: 3
  world_model_lr: 0.0003
  actor_lr: 0.0003
  critic_lr: 0.0003
  consistency_coef: 1.0
  reward_coef: 1.0
  balance_coef: 0.01
  rho: 0.5
  grad_clip_norm: 10.0

runtime:
  device: "cpu"  # 有 GPU 时改为 "cuda"
  seed: 0
